name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Lets you manually trigger a deploy from the Actions tab, without a new push.
  workflow_dispatch:

# Grant just the permissions the deploy step needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Avoid two deploys racing each other if you push twice in a row.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install, build, and upload site
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
